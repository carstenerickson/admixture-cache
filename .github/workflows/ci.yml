name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JS-based actions in to Node.js 24 ahead of GitHub's June 2026 forced
# migration. ci.yml currently only uses checkout@v5 + setup-python@v6 (already
# on Node 24); kept here for consistency with release.yml so future action
# additions don't trip the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Tests
        run: pytest --cov=src/admixture_cache --cov-report=term-missing
