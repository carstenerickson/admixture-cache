name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JS-based actions in to Node.js 24 ahead of GitHub's June 2026 forced
# migration. ci.yml currently only uses checkout@v5 + setup-python@v6 (already
# on Node 24); kept here for consistency with release.yml so future action
# additions don't trip the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Import layering (import-linter contracts)
        run: lint-imports

      - name: Tests
        run: pytest --cov=src/admixture_cache --cov-report=term-missing

  integration:
    name: Integration (Linux + ADMIXTURE 1.4 + plink2)
    runs-on: ubuntu-latest
    needs: test  # only run when unit tests are green
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install ADMIXTURE 1.4.0 (Linux x86_64)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/admixture.tar.gz \
            https://dalexander.github.io/admixture/binaries/admixture_linux-1.4.0.tar.gz
          tar -xzf /tmp/admixture.tar.gz -C /tmp/
          # Tarball extracts a top-level `admixture_linux-1.4.0/`
          # directory containing the binary + manual PDF.
          sudo install -m 0755 /tmp/admixture_linux-1.4.0/admixture /usr/local/bin/admixture
          admixture --help 2>&1 | head -3

      - name: Install plink2 (Linux x86_64)
        run: |
          set -euo pipefail
          # cog-genomics S3 publishes a `_latest.zip` symlink to the
          # current dev build. The bucket root (no subdir) hosts the
          # baseline x86_64 build, which is what we want for CI.
          curl -fsSL -o /tmp/plink2.zip \
            "https://s3.amazonaws.com/plink2-assets/plink2_linux_x86_64_latest.zip"
          unzip -o /tmp/plink2.zip -d /tmp/plink2/
          sudo install -m 0755 /tmp/plink2/plink2 /usr/local/bin/plink2
          plink2 --version 2>&1 | head -1

      - name: Run integration suite
        run: pytest -m integration -v
